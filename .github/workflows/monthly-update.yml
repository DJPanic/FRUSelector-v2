name: Monthly FRU Data Update & Release

on:
  schedule:
    # Run at midnight UTC on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

permissions:
  contents: write
  actions: write

jobs:
  update-fru-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Scrape latest service guide data
        run: |
          echo "Scraping Microsoft Learn service guides..."
          python scripts/scrape_service_guides.py scraped_data.json

      - name: Build, validate, and update HTML
        id: build
        run: |
          echo "Building and validating..."
          python scripts/build_and_validate.py scraped_data.json docs/index.html || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ $EXIT_CODE -eq 2 ]; then
            echo "warnings=true" >> $GITHUB_OUTPUT
            echo "⚠️ Validation warnings found — review the log above"
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          MONTH=$(date +"%B %Y")
          PARTS=$(python -c "
          import json, re
          with open('docs/index.html','r') as f: c=f.read()
          m=re.search(r'const DATA\s*=\s*',c); s=m.end(); e=c.find(';\n',s)
          d=json.loads(c[s:e])
          print(f\"{len(d['devices'])} devices, {len(d['parts'])} parts\")
          ")
          
          git add docs/index.html
          git commit -m "Monthly FRU data update — ${MONTH}

          Automated refresh from Microsoft Learn service guides.
          ${PARTS}
          
          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "✅ No data changes detected — HTML is already up to date"

      - name: Set up Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Build application
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Create Release with Artifacts
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: FRU Selector v2 - Monthly Release
          body: |
            ## Automated FRU Data Update & Build
            
            Updated FRU and SKU data from Microsoft Learn service guides.
            - **Devices**: Updated Surface device configurations
            - **Parts**: Latest FRU/ASP part numbers
            - **Built**: ${{ github.event.head_commit.timestamp }}
            
            ### What's New
            This is an automated monthly release that includes:
            - Scraped data from Microsoft Learn service guides
            - Rebuilt Electron application with latest part data
            - Updated HTML reference guide
          draft: false
          prerelease: false
          files: |
            dist/**/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        if: always()
        run: rm -f scraped_data.json
