name: Monthly FRU Data Update & Release

on:
  schedule:
    # Run at midnight UTC on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    name: Scrape data & commit
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape latest service guide data
        run: |
          echo "Scraping Microsoft Learn service guides..."
          python scripts/scrape_service_guides.py scraped_data.json

      - name: Build, validate, and update HTML
        run: |
          echo "Building and validating..."
          python scripts/build_and_validate.py scraped_data.json docs/index.html || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ Validation warnings found — review the log above"
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi

      - name: Generate app data file consumed by the React/Electron build
        run: |
          python scripts/generate_app_data.py scraped_data.json src/shared/scraped-data.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet docs/index.html src/shared/scraped-data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        id: commit
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MONTH=$(date +"%B %Y")
          PARTS=$(python -c "
          import json
          with open('src/shared/scraped-data.json') as f: d=json.load(f)
          print(f\"{d['deviceCount']} devices, {d['partCount']} parts\")
          ")

          git add docs/index.html src/shared/scraped-data.json
          git commit -m "Monthly FRU data update — ${MONTH}

          Automated refresh from Microsoft Learn service guides.
          ${PARTS}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "✅ No data changes detected — HTML and app data are already up to date"

      - name: Clean up temp files
        if: always()
        run: rm -f scraped_data.json

  build-and-release:
    name: Build Electron app & publish release
    needs: scrape-and-commit
    if: needs.scrape-and-commit.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout latest (post-commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.scrape-and-commit.outputs.commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          DATE=$(date -u +"%Y.%m.%d")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build & package Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "Listing release/ folder:"
          ls -la release/ || (echo "ERROR: release/ folder not found"; exit 1)
          if ! ls release/*.exe 1>/dev/null 2>&1; then
            echo "ERROR: no installer artifacts produced"
            exit 1
          fi

      - name: Create GitHub Release with installer artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: FRU Selector ${{ steps.tag.outputs.tag }}
          body: |
            ## Automated FRU Data Update & Build

            Refreshed FRU/SKU data from Microsoft Learn service guides and
            rebuilt the Surface FRU Selector Electron application.

            **Source commit:** ${{ needs.scrape-and-commit.outputs.commit_sha }}

            ### Downloads
            - `*.exe` — NSIS installer (recommended)
            - `*-portable.exe` — portable build (no install)

            Existing installations will auto-update via electron-updater.
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          token: ${{ secrets.GITHUB_TOKEN }}
